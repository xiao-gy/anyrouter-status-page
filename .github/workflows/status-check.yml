name: anyrouter-status-check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: anyrouter-status-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe and publish data
        env:
          ANYROUTER_API_BASE: ${{ secrets.ANYROUTER_API_BASE }}
          ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
          ANYROUTER_MODEL: ${{ secrets.ANYROUTER_MODEL }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          attempt=1
          max_attempts=3

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Publish attempt $attempt/$max_attempts"

            git fetch origin main
            git reset --hard origin/main

            python scripts/check_anyrouter.py

            git add docs/data/status.json docs/data/history.json
            if git diff --cached --quiet; then
              echo "No data changes to commit"
              exit 0
            fi

            git commit -m "chore(status): refresh anyrouter probe data"

            if git push origin HEAD:main; then
              echo "Publish succeeded"
              exit 0
            fi

            echo "Push failed; retrying on top of the latest origin/main"
            attempt=$((attempt + 1))
          done

          echo "Failed to publish data after $max_attempts attempts" >&2
          exit 1
